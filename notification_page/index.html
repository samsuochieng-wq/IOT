<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌱 Smart Farm – Notifications</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="brand">
        <span class="logo">🌱</span>
        <h1>Smart Farm</h1>
        <span class="subtitle">AI-Powered Advisory</span>
      </div>

      <p class="description">
        Get real‑time farm advisories sent to your inbox.
        Enter your email to subscribe.
      </p>

      <form id="registerForm">
        <div class="input-group">
          <input type="email" id="email" placeholder="you@example.com" required />
          <button type="submit" id="registerBtn">Subscribe</button>
        </div>
        <div id="status" data-kind=""></div>
      </form>

      <div class="footer">
        <span>🔒 Your email is safe with us.</span>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
