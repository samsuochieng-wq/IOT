<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌱 Smart Farm – Sign In</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet" />
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
        "firebase/database": "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"
      }
    }
  </script>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="brand">
        <span class="logo">🌱</span>
        <h1>Smart Farm</h1>
        <span class="subtitle">AI-Powered Advisory</span>
      </div>

      <p class="description">
        Sign in with Google to get real‑time farm advisories.
      </p>

      <!-- Google Sign‑in Button -->
      <button class="btn-google" id="googleBtn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" />
        Sign in with Google
      </button>

      <div class="divider"><span>or</span></div>

      <!-- Email fallback (for existing subscribers) -->
      <form id="emailForm">
        <div class="input-group">
          <input type="email" id="emailInput" placeholder="you@example.com" required />
          <button type="submit" id="emailSignInBtn">Sign in with Email</button>
        </div>
        <div id="status" data-kind=""></div>
      </form>

      <div class="footer">
        <span>🔒 Secured with Firebase Authentication</span>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
